<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 48" fill="none">
  <!-- Body -->
  <rect x="3" y="22" width="46" height="23" rx="3" fill="#1c1917"/>
  <!-- Clapper top -->
  <rect x="3" y="5" width="46" height="19" rx="3" fill="#1c1917"/>
  <!-- White diagonal stripes clipped to clapper -->
  <clipPath id="cp">
    <rect x="3" y="5" width="46" height="19" rx="3"/>
  </clipPath>
  <g clip-path="url(#cp)">
    <polygon points="10,5 23,5 16,24 3,24" fill="white"/>
    <polygon points="32,5 45,5 38,24 25,24" fill="white"/>
    <polygon points="54,5 67,5 60,24 47,24" fill="white"/>
  </g>
  <!-- Dividing line -->
  <rect x="3" y="23" width="46" height="1.5" fill="#333"/>
</svg>
