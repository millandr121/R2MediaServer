# Cloudflare Worker configuration for the R2 Media Server API.
#
# Fill in the *_id placeholders after you create the resources:
#   wrangler d1 create r2-media-server
#   wrangler kv namespace create SESSIONS
#   wrangler r2 bucket create r2-media-server
#
# Secrets (NEVER commit these — set with `wrangler secret put <NAME>`):
#   JWT_SECRET            random 32+ byte string
#   R2_ACCESS_KEY_ID      R2 S3 API token access key id
#   R2_SECRET_ACCESS_KEY  R2 S3 API token secret
#
# For local dev, copy .dev.vars.example to .dev.vars instead of using secrets.

name = "r2-media-server-api"
main = "src/index.ts"
compatibility_date = "2024-12-05"
compatibility_flags = ["nodejs_compat"]

# Public, non-secret config. Override per environment as needed.
[vars]
# Comma-separated list of allowed browser origins. The app is same-origin in
# production (the Worker serves the site too), so this mainly covers local dev.
ALLOWED_ORIGINS = "http://localhost:5173,https://drive.bamfieldmediahouse.ca,https://r2mediaserver.andrewglennmiller.workers.dev"
# Your R2 account id (the hex string in the R2 S3 endpoint). Not secret.
R2_ACCOUNT_ID = "1bec95af9250b042cab2ce1c14f5c885"
# The R2 bucket name (must match the binding below).
R2_BUCKET_NAME = "r2-media-server"
# Base URL of the site, used to build share links shown in the UI.
PUBLIC_APP_URL = "https://drive.bamfieldmediahouse.ca"

# Serve the built React app (apps/web/dist) for every path that isn't /api/*.
# Path is relative to this file, so ../web/dist => apps/web/dist.
[assets]
directory = "../web/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

[[d1_databases]]
binding = "DB"
database_name = "r2-media-server"
database_id = "b4482b64-72d6-4853-82e6-a1cc1ad8b9d1"

[[kv_namespaces]]
binding = "SESSIONS"
id = "709f7caeebae40f9a911a38baa796f0d"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "r2-media-server"

[observability]
enabled = true
